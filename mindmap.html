const DEPENDENCIES = [
  ["s1_conditional", "s1_bayes"],
  ["s1_distributions", "s2_model"],
  ["s0_calc", "s3_laplace"],
  ["s0_taylor", "s3_laplace"],

  ["s5_identify", "s4_reparam"],

  ["s6_multilevel", "s7_frailty"]
];

function normalizeStatus(value) {
  if (value === true) return 2;
  if (value === false || value == null) return 0;
  const number = Number(value);
  return Number.isInteger(number) && number >= 0 && number <= 3 ? number : 0;
}

function getProgress(id) {
  try {
    return JSON.parse(localStorage.getItem("bsm_" + id)) || {};
  } catch {
    return {};
  }
}

function getStatus(id, level) {
  return normalizeStatus(getProgress(id)[level]);
}

function cycleStatus(id, level) {
  const progress = getProgress(id);
  const next = (normalizeStatus(progress[level]) + 1) % STATUS_LABELS.length;
  progress[level] = next;
  localStorage.setItem("bsm_" + id, JSON.stringify(progress));
  return next;
}

function statusFill(status, stage) {
  if (status === 1) return "#d29922";
  if (status === 2) return COLORS[stage];
  if (status === 3) return "#f85149";
  return "#21262d";
}

function passedCount(id) {
  return LEVELS.filter(level => getStatus(id, level) === 2).length;
}

function getLeaves(stage) {
  const result = [];
  function walk(node) {
    if (node.leaf && node.s === stage) result.push(node);
    if (node.children) node.children.forEach(walk);
  }
  walk(DATA);
  return result;
}

function subtreeCount(node) {
  let passed = 0;
  let total = 0;
  function walk(current) {
    if (current.leaf) {
      passed += passedCount(current.id);
      total += LEVELS.length;
    }
    if (current.children) current.children.forEach(walk);
  }
  walk(node);
  return [passed, total];
}

const svg = d3.select("#svg");
const graph = svg.append("g");
const zoom = d3.zoom()
  .scaleExtent([0.15, 3])
  .on("zoom", event => graph.attr("transform", event.transform));
svg.call(zoom);

function resetView() {
  svg.call(
    zoom.transform,
    d3.zoomIdentity.translate(Math.min(210, window.innerWidth * 0.22), window.innerHeight / 2).scale(0.72)
  );
}
resetView();

const treeLayout = d3.tree().nodeSize([58, 276]).separation((a, b) => a.parent === b.parent ? 1 : 1.25);
const root = d3.hierarchy(DATA);
root.each(node => {
  if (node.depth >= 2 && node.children) {
    node._children = node.children;
    node.children = null;
  }
});
root.x0 = 0;
root.y0 = 0;

const NODE_WIDTH = 224;
const NODE_HEIGHT = 34;
const LEAF_HEIGHT = 52;
const DOT_RADIUS = 5;
const DOT_GAP = 17;

function toggle(node) {
  if (node.children) {
    node._children = node.children;
    node.children = null;
  } else {
    node.children = node._children;
    node._children = null;
  }
}

function visibleDependencies(nodes) {
  const byId = new Map(nodes.map(node => [node.data.id, node]));
  return DEPENDENCIES
    .map(([from, to]) => ({ key: from + "-" + to, source: byId.get(from), target: byId.get(to) }))
    .filter(edge => edge.source && edge.target);
}

function shortened(text) {
  return text.length > 30 ? text.slice(0, 29) + "…" : text;
}

function update(source) {
  treeLayout(root);
  const nodes = root.descendants();
  const links = root.links();

  const dependencies = graph.selectAll("path.dependency")
    .data(visibleDependencies(nodes), edge => edge.key);
  dependencies.enter()
    .append("path")
    .attr("class", "dependency")
    .merge(dependencies)
    .attr("d", edge => {
      const sx = edge.source.y + NODE_WIDTH;
      const sy = edge.source.x;
      const tx = edge.target.y;
      const ty = edge.target.x;
      return `M${sx},${sy}C${(sx + tx) / 2},${sy} ${(sx + tx) / 2},${ty} ${tx},${ty}`;
    });
  dependencies.exit().remove();
  graph.selectAll("path.dependency").lower();

  const link = graph.selectAll("path.link").data(links, edge => edge.target.data.id);
  link.enter()
    .append("path")
    .attr("class", "link")
    .attr("d", `M${source.y0 || 0},${source.x0 || 0}L${source.y0 || 0},${source.x0 || 0}`)
    .merge(link)
    .transition()
    .duration(250)
    .attr("stroke", edge => COLORS[edge.target.data.s] + "70")
    .attr("stroke-width", 1.5)
    .attr("d", edge => {
      const sx = edge.source.y + NODE_WIDTH;
      const sy = edge.source.x;
      const tx = edge.target.y;
      const ty = edge.target.x;
      return `M${sx},${sy}C${(sx + tx) / 2},${sy} ${(sx + tx) / 2},${ty} ${tx},${ty}`;
    });
  link.exit().transition().duration(250).remove();

  const selection = graph.selectAll("g.node").data(nodes, node => node.data.id);
  const enter = selection.enter()
    .append("g")
    .attr("class", "node")
    .attr("transform", `translate(${source.y0 || 0},${source.x0 || 0})`)
    .style("opacity", 0);

  enter.append("rect")
    .attr("x", 0)
    .attr("y", node => node.data.leaf ? -LEAF_HEIGHT / 2 : -NODE_HEIGHT / 2)
    .attr("width", NODE_WIDTH)
    .attr("height", node => node.data.leaf ? LEAF_HEIGHT : NODE_HEIGHT)
    .attr("rx", 7)
    .attr("fill", node => COLORS[node.data.s] + "18")
    .attr("stroke", node => COLORS[node.data.s] + "90")
    .attr("stroke-width", 1.5)
    .style("cursor", node => node.children || node._children ? "pointer" : "default")
    .on("click", (_, node) => {
      if (node.children || node._children) {
        toggle(node);
        update(node);
      }
    });

  const label = enter.append("text")
    .attr("class", "label")
    .attr("x", 10)
    .attr("y", node => node.data.leaf ? -10 : node.depth > 0 ? -3 : 5)
    .attr("fill", node => COLORS[node.data.s])
    .attr("font-size", node => node.depth === 0 ? 15 : 11.5)
    .attr("font-weight", node => node.depth <= 1 ? 600 : 400)
    .style("cursor", node => node.children || node._children ? "pointer" : "default")
    .text(node => shortened(node.data.name))
    .on("click", (event, node) => {
      event.stopPropagation();
      if (node.children || node._children) {
        toggle(node);
        update(node);
      }
    });
  label.append("title").text(node => node.data.name);

  enter.filter(node => !node.data.leaf && node.depth > 0)
    .append("text")
    .attr("class", "count")
    .attr("x", 10)
    .attr("y", 13)
    .attr("font-size", 10)
    .attr("fill", "#8b949e");

  enter.filter(node => !node.data.leaf)
    .append("text")
    .attr("class", "arrow")
    .attr("x", NODE_WIDTH - 17)
    .attr("y", 5)
    .attr("font-size", 11)
    .attr("fill", "#8b949e")
    .style("cursor", "pointer")
    .on("click", (event, node) => {
      event.stopPropagation();
      toggle(node);
      update(node);
    });

  enter.filter(node => node.data.leaf).each(function(node) {
    const leaf = d3.select(this);
    LEVELS.forEach((level, index) => {
      const circle = leaf.append("circle")
        .datum({ level, id: node.data.id, stage: node.data.s, index })
        .attr("class", "progress-dot")
        .attr("cx", 10 + DOT_RADIUS + index * DOT_GAP)
        .attr("cy", 15)
        .attr("r", DOT_RADIUS)
        .attr("fill", statusFill(getStatus(node.data.id, level), node.data.s))
        .attr("stroke", COLORS[node.data.s])
        .attr("stroke-width", 1)
        .style("cursor", "pointer")
        .on("click", (event, dot) => {
          event.stopPropagation();
          const status = cycleStatus(dot.id, dot.level);
          d3.select(event.currentTarget).attr("fill", statusFill(status, dot.stage));
          d3.select(event.currentTarget).select("title")
            .text(`${dot.index + 1}. ${dot.level}: ${STATUS_LABELS[status]}`);
          updateCounts();
          updateStats();
        });
      circle.append("title")
        .text(`${index + 1}. ${level}: ${STATUS_LABELS[getStatus(node.data.id, level)]}`);
    });
  });

  const merged = selection.merge(enter);
  merged.transition()
    .duration(250)
    .attr("transform", node => `translate(${node.y},${node.x})`)
    .style("opacity", 1);

  merged.select(".arrow").text(node => node.children ? "▾" : node._children ? "▸" : "");
  merged.select(".count").text(node => {
    if (!node.data || node.data.leaf) return "";
    const [passed, total] = subtreeCount(node.data);
    return total ? `${passed}/${total} 통과` : "";
  });
  merged.selectAll(".progress-dot").attr("fill", function() {
    const dot = d3.select(this).datum();
    return statusFill(getStatus(dot.id, dot.level), dot.stage);
  });

  selection.exit()
    .transition()
    .duration(250)
    .attr("transform", `translate(${source.y},${source.x})`)
    .style("opacity", 0)
    .remove();

  nodes.forEach(node => {
    node.x0 = node.x;
    node.y0 = node.y;
  });
}

function updateCounts() {
  graph.selectAll("g.node").select(".count").text(node => {
    if (!node.data || node.data.leaf || node.depth === 0) return "";
    const [passed, total] = subtreeCount(node.data);
    return total ? `${passed}/${total} 통과` : "";
  });
}

function updateStats() {
  document.getElementById("stat-rows").innerHTML = d3.range(0, 9).map(stage => {
    const leaves = getLeaves(stage);
    const total = leaves.length * LEVELS.length;
    const passed = leaves.reduce((sum, node) => sum + passedCount(node.id), 0);
    const percentage = total ? Math.round(passed / total * 100) : 0;
    return `<div class="s-row">
      <span class="s-name">${STAGE_NAMES[stage]}</span>
      <div class="s-bar-bg"><div class="s-bar" style="width:${percentage}%;background:${COLORS[stage]}"></div></div>
      <span class="s-pct" style="color:${COLORS[stage]}">${percentage}%</span>
    </div>`;
  }).join("");
}

window.addEventListener("resize", resetView);
update(root);
updateStats();
</script>
</body>
</html>
